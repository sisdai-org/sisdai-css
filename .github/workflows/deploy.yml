name: Despliegue sisdai-css
on:
  push:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v6
      - name: Instalar dependencias y compilar
        run: |
          npm install
          npm run build
      - name: Guardar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: /docs/dist/

  despliegue-desarrollo:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: desarrollo
      url: https://dev-estilos.sisdai.org
    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: /docs/dist/
      - name: Despliegue a desarrollo
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /docs/dist/
          server-dir: /dev-estilos/

  despliegue-produccion:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: produccion
      url: https://estilos.sisdai.org
    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: /docs/dist/
      - name: Despliegue a producción
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /docs/dist/
          server-dir: /estilos/