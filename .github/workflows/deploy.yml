name: Despliegue sisdai-estilos

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Instalar dependencias y compilar
        run: |
          npm install
          npm run build

      - name: Despliegue a ambiente de desarrollo DEVELOP (rama develop → dev-estilos.sisdai.org)
        if: github.ref == 'refs/heads/develop'
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /dev-estilos/

      - name: Deploy a ambiente de PRODUCCIÓN (rama main → estilos.sisdai.org)
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /estilos/